
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webvfx</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background: #000;
            color: #f3f4f6;
        }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(75, 85, 99, 0.35);
        }
        .gradient-text {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .animate-star-btn {
            animation: none;
        }
        @property --angle {
            syntax: "<angle>";
            inherits: true;
            initial-value: 0deg;
        }
        @keyframes star-border-rotate {
            0% {
                --angle: 0deg;
            }
            100% {
                --angle: 360deg;
            }
        }
        .star-border {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: 9999px;
            border: var(--border-width, 2px) solid transparent;
            background:
                linear-gradient(transparent, transparent) padding-box,
                conic-gradient(
                from var(--angle),
                transparent 0deg,
                color-mix(in srgb, var(--light-color) 90%, transparent) 70deg,
                transparent 120deg,
                transparent 180deg,
                color-mix(in srgb, var(--light-color) 90%, transparent) 250deg,
                transparent 300deg,
                transparent 360deg
            ) border-box;
            background-clip: padding-box, border-box;
            animation: star-border-rotate var(--duration, 3s) linear infinite;
            filter: drop-shadow(0 0 14px color-mix(in srgb, var(--light-color) 85%, transparent));
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
<body class="bg-black text-gray-100 antialiased overflow-x-hidden">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
